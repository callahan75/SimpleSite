<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Andreas Lieber</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #fdf6e3;
      font-family: Georgia, serif;
    }
    h1 {
      font-size: 3.5rem;
      color: #333;
      margin-bottom: 2rem;
      letter-spacing: 0.02em;
    }
    img {
      max-width: 480px;
      width: 90%;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }
    p {
      margin-top: 1.2rem;
      color: #888;
      font-size: 0.9rem;
      font-style: italic;
    }
  </style>
</head>
<body>
  <h1>Andreas Lieber</h1>
  <svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
    <!-- Face -->
    <circle cx="160" cy="160" r="150" fill="#FFD700" stroke="#333" stroke-width="6"/>
    <!-- Left eye -->
    <ellipse cx="105" cy="120" rx="28" ry="36" fill="white" stroke="#333" stroke-width="4"/>
    <circle cx="105" cy="128" r="16" fill="#333"/>
    <circle cx="112" cy="120" r="6" fill="white"/>
    <!-- Right eye (googly — looking opposite direction) -->
    <ellipse cx="215" cy="120" rx="28" ry="36" fill="white" stroke="#333" stroke-width="4"/>
    <circle cx="208" cy="128" r="16" fill="#333"/>
    <circle cx="222" cy="120" r="6" fill="white"/>
    <!-- Eyebrows (one raised, one furrowed) -->
    <path d="M80 85 Q105 70 130 82" stroke="#333" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M188 72 Q215 88 240 78" stroke="#333" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Nose -->
    <ellipse cx="160" cy="175" rx="14" ry="10" fill="#FFA500" stroke="#333" stroke-width="3"/>
    <!-- Big goofy grin -->
    <path d="M85 215 Q160 290 235 215" stroke="#333" stroke-width="6" fill="white" stroke-linecap="round"/>
    <!-- Teeth -->
    <path d="M110 228 L110 255 M140 235 L140 265 M160 238 L160 268 M180 235 L180 265 M210 228 L210 255" stroke="#333" stroke-width="4" stroke-linecap="round"/>
    <!-- Tongue -->
    <ellipse cx="160" cy="262" rx="30" ry="18" fill="#FF6B8A"/>
    <!-- Ear left -->
    <ellipse cx="12" cy="160" rx="18" ry="30" fill="#FFD700" stroke="#333" stroke-width="5"/>
    <!-- Ear right -->
    <ellipse cx="308" cy="160" rx="18" ry="30" fill="#FFD700" stroke="#333" stroke-width="5"/>
  </svg>
  <p>Extremely professional headshot.</p>
</body>
</html>
